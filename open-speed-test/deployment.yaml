apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-speed-test
  namespace: homelab-tools
  labels:
    app: open-speed-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-speed-test
  template:
    metadata:
      labels:
        app: open-speed-test
    spec:
      hostNetwork: true # Faz o container rodar direto na interface física do servidor
      dnsPolicy: ClusterFirstWithHostNet # Mantém a resolução de DNS do K8s ativa no pod
      containers:
        - name: openspeedtest
          image: openspeedtest/latest:latest
          ports:
            - containerPort: 3000
              hostPort: 3000 # Mapeia a porta 3000 física do host para o container
              name: http
          env:
            - name: ENABLE_LETSENCRYPT
              value: "False"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: open-speed-test-service
  namespace: homelab-tools
spec:
  selector:
    app: open-speed-test
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: speedtest-buffering
  namespace: homelab-tools
spec:
  buffering:
    maxRequestBodyBytes: 0
    memRequestBodyBytes: 0
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: open-speed-test
  namespace: homelab-tools
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod-dns"
    traefik.ingress.kubernetes.io/router.middlewares: homelab-tools-speedtest-buffering@kubernetescrd
spec:
  rules:
    - host: "speedtest.cezaodabahia.com.br"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: open-speed-test-service
                port:
                  number: 80
  tls:
    - hosts:
        - "speedtest.cezaodabahia.com.br"
      secretName: open-speed-test-tls-secret
